<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1b2a">
<title>A∴R∴L∴S∴ James Anderson nº 4775 — Tesouraria</title>
<link rel="icon" type="image/jpeg" href="logo-loja.jpg">
<style>
  :root{
    --navy:#0d1b2a; --navy2:#132a40; --panel:#0f2236; --line:#1e3a52;
    --gold:#c9a227; --gold2:#e7c75a; --txt:#e8eef4; --muted:#9fb3c8;
    --green:#2e9e6b; --red:#d65a5a; --amber:#d9a441; --blue:#3a7bd5;
    --radius:14px; --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,#16314a 0,var(--navy) 60%);
    color:var(--txt);min-height:100vh}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  .hidden{display:none!important}

  /* ---------- LOGIN ---------- */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-card{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--line);
    border-radius:18px;padding:34px 30px;box-shadow:var(--shadow);text-align:center}
  .crest{font-size:46px;color:var(--gold);line-height:1}
  .logo-login{width:120px;height:120px;border-radius:50%;object-fit:cover;
    border:2px solid var(--gold);box-shadow:0 0 0 4px rgba(201,162,39,.12),var(--shadow)}
  .logo-top{width:40px;height:40px;border-radius:50%;object-fit:cover;border:1.5px solid var(--gold)}
  .login-card h1{font-size:19px;margin:14px 0 2px;letter-spacing:.5px}
  .login-card .sub{color:var(--muted);font-size:13px;margin-bottom:22px}
  .field{text-align:left;margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  .field input,.field select{width:100%;padding:11px 12px;background:var(--navy);color:var(--txt);
    border:1px solid var(--line);border-radius:10px;font-size:14px}
  .field input:focus,.field select:focus{outline:none;border-color:var(--gold)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;
    border-radius:10px;padding:11px 16px;font-size:14px;font-weight:600;background:var(--gold);color:#1a1206}
  .btn:hover{background:var(--gold2)}
  .btn:disabled{opacity:.6;cursor:default}
  .btn.block{width:100%}
  .btn.ghost{background:transparent;color:var(--txt);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--gold);color:var(--gold2)}
  .btn.sm{padding:7px 11px;font-size:12.5px;border-radius:8px}
  .btn.danger{background:var(--red);color:#fff}
  .login-hint{margin-top:18px;font-size:11.5px;color:var(--muted);line-height:1.6;
    background:var(--navy);border:1px dashed var(--line);border-radius:10px;padding:10px}
  .err{color:var(--red);font-size:12.5px;margin-top:8px;min-height:16px}

  /* ---------- APP SHELL ---------- */
  #app{display:none;min-height:100vh}
  .topbar{display:flex;align-items:center;gap:14px;padding:12px 20px;background:var(--navy2);
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .topbar .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.3px}
  .topbar .brand .crest{font-size:24px}
  .topbar .brand small{display:block;font-weight:400;color:var(--muted);font-size:11px}
  .topbar .spacer{flex:1}
  .userchip{display:flex;align-items:center;gap:10px;font-size:13px}
  .userchip .av{width:34px;height:34px;border-radius:50%;background:var(--gold);color:#1a1206;
    display:flex;align-items:center;justify-content:center;font-weight:700}
  .userchip .role{color:var(--gold2);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .menu-toggle{display:none;background:transparent;border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:7px 10px;font-size:18px}

  .layout{display:flex;min-height:calc(100vh - 59px)}
  .sidebar{width:230px;background:var(--panel);border-right:1px solid var(--line);padding:14px 10px;flex-shrink:0}
  .nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;
    border:none;color:var(--muted);padding:11px 13px;border-radius:10px;font-size:14px;margin-bottom:3px}
  .nav-item .ic{width:22px;text-align:center;font-size:16px}
  .nav-item:hover{background:var(--navy);color:var(--txt)}
  .nav-item.active{background:linear-gradient(90deg,rgba(201,162,39,.18),transparent);
    color:var(--gold2);border-left:3px solid var(--gold);padding-left:10px}
  .main{flex:1;padding:24px;overflow-x:auto}
  .page-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:20px;flex-wrap:wrap}
  .page-head h2{font-size:21px;font-weight:700}
  .page-head p{color:var(--muted);font-size:13px;margin-top:3px}

  /* ---------- COMPONENTS ---------- */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:22px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .card .k{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .card .v{font-size:25px;font-weight:700;margin-top:7px}
  .card .v.green{color:var(--green)} .card .v.red{color:var(--red)} .card .v.gold{color:var(--gold2)}
  .card .foot{font-size:12px;color:var(--muted);margin-top:6px}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:18px}
  .panel h3{font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar input,.toolbar select{padding:9px 11px;background:var(--navy);color:var(--txt);
    border:1px solid var(--line);border-radius:9px;font-size:13px}
  .toolbar .grow{flex:1;min-width:160px}

  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  tr:hover td{background:rgba(255,255,255,.02)}
  td.num,th.num{text-align:right}
  .empty{text-align:center;color:var(--muted);padding:30px;font-size:13px}

  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
  .badge.green{background:rgba(46,158,107,.16);color:#6fe0a8}
  .badge.red{background:rgba(214,90,90,.16);color:#ff9b9b}
  .badge.amber{background:rgba(217,164,65,.16);color:#f0c878}
  .badge.blue{background:rgba(58,123,213,.16);color:#9ec3ff}
  .badge.gray{background:rgba(159,179,200,.14);color:var(--muted)}

  .row-actions{display:flex;gap:6px;justify-content:flex-end}
  .iconbtn{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px;
    padding:5px 9px;font-size:12px}
  .iconbtn:hover{border-color:var(--gold);color:var(--gold2)}
  .iconbtn.del:hover{border-color:var(--red);color:#ff9b9b}

  /* ---------- MODAL ---------- */
  .overlay{position:fixed;inset:0;background:rgba(4,10,18,.66);display:flex;align-items:center;
    justify-content:center;padding:20px;z-index:50}
  .modal{width:100%;max-width:480px;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;box-shadow:var(--shadow);max-height:90vh;overflow:auto}
  .modal header{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;
    align-items:center;justify-content:space-between}
  .modal header h3{font-size:16px}
  .modal .body{padding:20px}
  .modal .body .field{margin-bottom:14px}
  .modal .body label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  .modal .body input,.modal .body select,.modal .body textarea{width:100%;padding:10px 12px;
    background:var(--navy);color:var(--txt);border:1px solid var(--line);border-radius:9px;font-size:14px}
  .modal .body textarea{resize:vertical;min-height:70px}
  .modal footer{padding:16px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--navy2);border:1px solid var(--gold);color:var(--txt);padding:12px 20px;
    border-radius:10px;font-size:13.5px;opacity:0;transition:.3s;z-index:99;box-shadow:var(--shadow);max-width:90vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .meeting{display:flex;gap:14px;padding:14px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:var(--navy)}
  .meeting .date{flex-shrink:0;width:58px;text-align:center;background:var(--navy2);border-radius:10px;padding:8px 0}
  .meeting .date .d{font-size:22px;font-weight:700;color:var(--gold2);line-height:1}
  .meeting .date .m{font-size:11px;color:var(--muted);text-transform:uppercase}
  .meeting .info{flex:1}
  .meeting .info h4{font-size:15px;margin-bottom:3px}
  .meeting .info .meta{font-size:12.5px;color:var(--muted)}

  #splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:var(--navy);z-index:200}
  #splash .crest{font-size:50px;animation:pulse 1.4s ease-in-out infinite}
  #splash p{color:var(--muted);font-size:13px}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

  @media(max-width:820px){
    .menu-toggle{display:block}
    .sidebar{position:fixed;left:0;top:59px;bottom:0;z-index:30;transform:translateX(-100%);transition:.25s}
    .sidebar.open{transform:translateX(0)}
    .userchip .meta{display:none}
    .grid2{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- ============ SPLASH ============ -->
<div id="splash"><div class="crest" style="color:var(--gold)">&#9737;</div><p>Carregando…</p></div>

<!-- ============ LOGIN ============ -->
<div id="login" style="display:none">
  <form class="login-card" onsubmit="doLogin(event)">
    <img class="logo-login" src="logo-loja.jpg" alt="Brasão da Loja James Anderson nº 4775">
    <h1>A∴R∴L∴S∴ James Anderson nº 4775</h1>
    <div class="sub">Sistema de Tesouraria & Secretaria</div>
    <div class="field">
      <label>E-mail</label>
      <input id="lg-email" type="email" autocomplete="username" placeholder="seu@email.com">

      <label>Senha</label>

<!-- ============ APP ============ -->
<div id="app">
  <div class="topbar">
    <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">&#9776;</button>
    <div class="brand"><img class="logo-top" src="logo-loja.jpg" alt="">
      <div>James Anderson nº 4775<small>Maçonaria Inglesa no Pará — Tesouraria</small></div>
    </div>
    <div class="spacer"></div>
    <div class="userchip">
      <div class="meta" style="text-align:right">
        <div id="uc-name" style="font-weight:600"></div>
        <div class="role" id="uc-role"></div>
      </div>

    </div>
  </div>

  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="main"></main>
  </div>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =================================================================
   CONFIGURAÇÃO DO SUPABASE
   ================================================================= */
const SUPABASE_URL = "https://rcnuexnvsrwqlrwecnvy.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjbnVleG52c3J3cWxyd2VjbnZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1OTAyMjYsImV4cCI6MjA5ODE2NjIyNn0.kd5ltznnr1A9LQ2G2guf2_R78w1PG_sZUjAqMk9fKG8";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const GRAUS = ["Aprendiz","Companheiro","Mestre","Mestre Instalado"];

/* cache em memória dos dados do banco */
let DB = {irmaos:[],mens:[],taxas:[],caixa:[],reunioes:[],manuais:[]};
let USER = null;

/* =================================================================
   PERMISSÕES
   ================================================================= */
const CAN = {
  tesoureiro:{dashboard:1,irmaos:"edit",mensalidades:"edit",taxas:"edit",caixa:"edit",reunioes:"view",manuais:"edit",minha:1},
  secretario:{dashboard:1,irmaos:"view",mensalidades:"view",taxas:"view",caixa:"view",reunioes:"edit",manuais:"edit",minha:1},
  irmao:{dashboard:0,irmaos:0,mensalidades:0,taxas:0,caixa:0,reunioes:"view",manuais:0,minha:1},
};
function can(area){return CAN[USER.perfil][area];}
function canEdit(area){return CAN[USER.perfil][area]==="edit";}

/* =================================================================
   UTILS
   ================================================================= */
const $=s=>document.querySelector(s);
const BRL=v=>(Number(v)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
function fdate(iso){if(!iso)return "—";const[y,m,d]=iso.split("-");return `${d}/${m}/${y}`;}
function refLabel(ref){const[y,m]=ref.split("-");return `${MESES[+m-1]}/${y}`;}
function irmaoNome(id){const i=DB.irmaos.find(x=>x.id===id);return i?i.nome:"—";}
function initials(n){return n.replace(/[∴.]/g,"").trim().split(/\s+/).slice(0,2).map(w=>w[0]).join("").toUpperCase();}
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),3000);}
function esc(s){return String(s==null?"":s).replace(/"/g,"&quot;");}
function isoAddDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function vencDoMes(ref,dia){const[y,mo]=ref.split("-").map(Number);const ult=new Date(y,mo,0).getDate();const d=Math.min(Math.max(dia||10,1),ult);return ref+"-"+String(d).padStart(2,"0");}
function slug(s){return s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");}

/* =================================================================
   CAMADA DE DADOS (Supabase)
   ================================================================= */
const mapIrmaoIn=r=>({id:r.id,nome:r.nome,grau:r.grau,email:r.email||"",tel:r.telefone||"",mensalidade:Number(r.mensalidade)||0,diaVenc:r.dia_venc||10,ingresso:r.ingresso||"",ativo:r.ativo});
const mapIrmaoOut=o=>({nome:o.nome,grau:o.grau,email:o.email||null,telefone:o.tel||null,mensalidade:o.mensalidade,dia_venc:o.diaVenc,ingresso:o.ingresso||null,ativo:o.ativo});
const mapMensIn=r=>({id:r.id,irmaoId:r.irmao_id,ref:r.ref,valor:Number(r.valor)||0,vencimento:r.vencimento,status:r.status,pagamento:r.pagamento});
const mapTaxaIn=r=>({id:r.id,descricao:r.descricao,irmaoId:r.irmao_id,valor:Number(r.valor)||0,vencimento:r.vencimento,status:r.status});
const mapCaixaIn=r=>({id:r.id,tipo:r.tipo,categoria:r.categoria,descricao:r.descricao,valor:Number(r.valor)||0,data:r.data});
const mapManualIn=r=>({grau:r.grau,titulo:r.titulo||("Manual do "+r.grau),arquivo_path:r.arquivo_path||null});

async function reloadIrmaos(){const{data,error}=await sb.from("irmaos").select("*").order("nome");if(error)throw error;DB.irmaos=(data||[]).map(mapIrmaoIn);}
async function reloadMens(){const{data,error}=await sb.from("mensalidades").select("*");if(error)throw error;DB.mens=(data||[]).map(mapMensIn);}
async function reloadTaxas(){const{data,error}=await sb.from("taxas").select("*");if(error)throw error;DB.taxas=(data||[]).map(mapTaxaIn);}
async function reloadCaixa(){const{data,error}=await sb.from("caixa").select("*");if(error)throw error;DB.caixa=(data||[]).map(mapCaixaIn);}
async function reloadReunioes(){const{data,error}=await sb.from("reunioes").select("*");if(error)throw error;DB.reunioes=data||[];}
async function reloadManuais(){const{data,error}=await sb.from("manuais").select("*");if(error)throw error;DB.manuais=(data||[]).map(mapManualIn);}
async function loadAll(){await Promise.all([reloadIrmaos(),reloadMens(),reloadTaxas(),reloadReunioes(),reloadManuais(),reloadCaixa().catch(()=>{DB.caixa=[];})]);}

function manualHref(m){return m.arquivo_path?`${SUPABASE_URL}/storage/v1/object/public/manuais/${m.arquivo_path}`:null;}

/* =================================================================
   LOGIN / SESSÃO
   ================================================================= */
async function doLogin(e){
  e.preventDefault();
  const email=$("#lg-email").value.trim(), pass=$("#lg-pass").value;
  $("#lg-err").textContent=""; $("#lg-btn").disabled=true; $("#lg-btn").textContent="Entrando…";
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){throw error;}
    await afterLogin(data.user);
  }catch(err){
    $("#lg-err").textContent = (err.message||"").includes("Invalid")?"E-mail ou senha incorretos.":("Erro: "+err.message);
  }finally{
    $("#lg-btn").disabled=false; $("#lg-btn").textContent="Entrar";
  }
}
async function afterLogin(user){
  const{data:prof,error}=await sb.from("perfis").select("*").eq("id",user.id).maybeSingle();
  if(error||!prof){$("#lg-err").textContent="Seu acesso ainda não foi liberado pelo Tesoureiro.";await sb.auth.signOut();showLogin();return;}
  USER={id:user.id,nome:prof.nome,perfil:prof.perfil,irmaoId:prof.irmao_id};
  await loadAll();
  $("#splash").style.display="none";
  $("#login").style.display="none";
  $("#app").style.display="block";
  $("#uc-name").textContent=USER.nome;
  $("#uc-role").textContent=USER.perfil;
  $("#uc-av").textContent=initials(USER.nome);
  buildNav();
  go(USER.perfil==="irmao" ? "minha" : "dashboard");
}
function showLogin(){$("#splash").style.display="none";$("#app").style.display="none";$("#login").style.display="flex";}
async function logout(){await sb.auth.signOut();USER=null;DB={irmaos:[],mens:[],taxas:[],caixa:[],reunioes:[],manuais:[]};$("#lg-email").value="";$("#lg-pass").value="";showLogin();}

async function init(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(session&&session.user){await afterLogin(session.user);}
    else{showLogin();}
  }catch(e){showLogin();}
}

/* =================================================================
   NAVEGAÇÃO
   ================================================================= */
const NAV=[
  {k:"dashboard",ic:"&#9783;",t:"Painel"},
  {k:"irmaos",ic:"&#9823;",t:"Irmãos"},
  {k:"mensalidades",ic:"&#9750;",t:"Mensalidades"},
  {k:"taxas",ic:"&#9874;",t:"Taxas"},
  {k:"caixa",ic:"&#9776;",t:"Caixa"},
  {k:"reunioes",ic:"&#9737;",t:"Reuniões"},
  {k:"manuais",ic:"&#128214;",t:"Manuais"},
  {k:"minha",ic:"&#9819;",t:"Minha Situação"},
];
let CURRENT="dashboard";
function buildNav(){
  const nav=$("#sidebar");nav.innerHTML="";
  NAV.forEach(n=>{
    if(!can(n.k))return;
    const b=document.createElement("button");
    b.className="nav-item"+(n.k===CURRENT?" active":"");
    b.innerHTML=`<span class="ic">${n.ic}</span> ${n.t}`;
    b.onclick=()=>{go(n.k);document.querySelector('.sidebar').classList.remove('open');};
    b.dataset.k=n.k; nav.appendChild(b);
  });
}
function go(k){
  CURRENT=k;
  document.querySelectorAll(".nav-item").forEach(b=>b.classList.toggle("active",b.dataset.k===k));
  ({dashboard:pageDashboard,irmaos:pageIrmaos,mensalidades:pageMensalidades,
    taxas:pageTaxas,caixa:pageCaixa,reunioes:pageReunioes,manuais:pageManuais,minha:pageMinha}[k])();
}

/* =================================================================
   PÁGINA: DASHBOARD
   ================================================================= */
function pageDashboard(){
  const mesRef=new Date().toISOString().slice(0,7);
  const mensMes=DB.mens.filter(m=>m.ref===mesRef);
  const recebido=DB.mens.filter(m=>m.status==="pago").reduce((s,m)=>s+m.valor,0);
  const aReceber=DB.mens.filter(m=>m.status!=="pago").reduce((s,m)=>s+m.valor,0);
  const entradas=DB.caixa.filter(c=>c.tipo==="entrada").reduce((s,c)=>s+c.valor,0);
  const saidas=DB.caixa.filter(c=>c.tipo==="saida").reduce((s,c)=>s+c.valor,0);
  const saldo=entradas-saidas;
  const inadimplentes=DB.mens.filter(m=>m.status==="atrasado"||(m.status==="pendente"&&m.ref<mesRef)).length;
  const prox=DB.reunioes.filter(r=>r.data>=new Date().toISOString().slice(0,10)).sort((a,b)=>a.data.localeCompare(b.data))[0];

  $("#main").innerHTML=`
    <div class="page-head"><div>
      <h2>Painel da Tesouraria</h2>
      <p>Visão geral financeira da Loja — ${refLabel(mesRef)}</p>
    </div></div>
    <div class="cards">
      <div class="card"><div class="k">Saldo em Caixa</div><div class="v ${saldo>=0?'green':'red'}">${BRL(saldo)}</div><div class="foot">Entradas ${BRL(entradas)} · Saídas ${BRL(saidas)}</div></div>
      <div class="card"><div class="k">Mensalidades Recebidas</div><div class="v gold">${BRL(recebido)}</div><div class="foot">acumulado de pagamentos</div></div>
      <div class="card"><div class="k">A Receber</div><div class="v ${aReceber>0?'red':'green'}">${BRL(aReceber)}</div><div class="foot">${DB.mens.filter(m=>m.status!=='pago').length} mensalidade(s) em aberto</div></div>
      <div class="card"><div class="k">Inadimplentes</div><div class="v ${inadimplentes>0?'red':'green'}">${inadimplentes}</div><div class="foot">pagamentos atrasados</div></div>
    </div>
    <div class="panel">
      <h3>&#9737; Próxima Reunião</h3>
      ${prox?`<div class="meeting"><div class="date"><div class="d">${prox.data.split("-")[2]}</div><div class="m">${MESES[+prox.data.split("-")[1]-1]}</div></div>
        <div class="info"><h4>${prox.titulo}</h4><div class="meta">${prox.hora||""} · ${prox.local||""} · <span class="badge blue">${prox.tipo||""}</span></div></div></div>`
        :`<div class="empty">Nenhuma reunião agendada.</div>`}
    </div>
    <div class="panel">
      <h3>&#9750; Situação das Mensalidades (${refLabel(mesRef)})</h3>
      <table><thead><tr><th>Irmão</th><th>Valor</th><th>Status</th></tr></thead><tbody>
      ${mensMes.length?mensMes.map(m=>`<tr><td>${irmaoNome(m.irmaoId)}</td><td>${BRL(m.valor)}</td><td>${statusBadge(m.status)}</td></tr>`).join(""):`<tr><td colspan="3" class="empty">Sem lançamentos para o mês.</td></tr>`}
      </tbody></table>
    </div>`;
}
function statusBadge(s){
  const map={pago:["green","Pago"],pendente:["amber","Pendente"],atrasado:["red","Atrasado"]};
  const[c,t]=map[s]||["gray",s];return `<span class="badge ${c}">${t}</span>`;
}

function renderIrmaos(){

  $("#ir-table").innerHTML=`<table><thead><tr><th>Nome</th><th>Grau</th><th>Contato</th><th class="num">Mensalidade</th><th>Status</th>${edit?'<th></th>':''}</tr></thead><tbody>
    ${rows.length?rows.map(i=>`<tr>
      <td><b>${i.nome}</b><br><small style="color:var(--muted)">Ingresso ${fdate(i.ingresso)}</small></td>
      <td>${i.grau}</td>
      <td>${i.email}<br><small style="color:var(--muted)">${i.tel}</small></td>
      <td class="num">${BRL(i.mensalidade)}</td>

      ${edit?`<td><div class="row-actions"><button class="iconbtn" onclick="modalIrmao(${i.id})">Editar</button><button class="iconbtn del" onclick="delIrmao(${i.id})">Excluir</button></div></td>`:''}
    </tr>`).join(""):`<tr><td colspan="6" class="empty">Nenhum irmão encontrado.</td></tr>`}
  </tbody></table>`;
}
function modalIrmao(id){
  const i=id?DB.irmaos.find(x=>x.id===id):{nome:"",grau:"Aprendiz",email:"",tel:"",mensalidade:100,diaVenc:10,ingresso:new Date().toISOString().slice(0,10),ativo:true};
  openModal(id?"Editar Irmão":"Novo Irmão",`
    <div class="field"><label>Nome completo</label><input id="m-nome" value="${esc(i.nome)}"></div>
    <div class="grid2">
      <div class="field"><label>Grau</label><select id="m-grau">${GRAUS.map(g=>`<option ${g===i.grau?'selected':''}>${g}</option>`).join("")}</select></div>
      <div class="field"><label>Mensalidade (R$)</label><input id="m-mens" type="number" step="10" value="${i.mensalidade}"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>E-mail</label><input id="m-email" value="${esc(i.email)}"></div>
      <div class="field"><label>Telefone</label><input id="m-tel" value="${esc(i.tel)}"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Dia de vencimento da mensalidade</label><input id="m-dia" type="number" min="1" max="31" value="${i.diaVenc||10}"></div>
      <div class="field"><label>Data de ingresso</label><input id="m-ing" type="date" value="${i.ingresso||''}"></div>
    </div>
    <div class="field"><label>Situação</label><select id="m-ativo"><option value="1" ${i.ativo?'selected':''}>Ativo</option><option value="0" ${!i.ativo?'selected':''}>Inativo</option></select></div>`,
    async ()=>{
      const nome=$("#m-nome").value.trim();if(!nome){toast("Informe o nome.");return false;}
      const obj={nome,grau:$("#m-grau").value,email:$("#m-email").value.trim(),tel:$("#m-tel").value.trim(),
        mensalidade:+$("#m-mens").value||0,diaVenc:Math.min(Math.max(+$("#m-dia").value||10,1),31),ingresso:$("#m-ing").value,ativo:$("#m-ativo").value==="1"};
      try{
        if(id){
          const{error}=await sb.from("irmaos").update(mapIrmaoOut(obj)).eq("id",id);if(error)throw error;
          await reloadIrmaos();renderIrmaos();toast("Irmão atualizado.");
        }else{
          const{data,error}=await sb.from("irmaos").insert(mapIrmaoOut(obj)).select().single();if(error)throw error;
          await reloadIrmaos();renderIrmaos();toast("Irmão cadastrado.");
          const novo=mapIrmaoIn(data);
          if(novo.ativo&&novo.ingresso){
            setTimeout(()=>confirmBox(
              `Lançar as mensalidades de <b>${novo.nome.split(" ")[0]}</b> desde o ingresso (${refLabel(novo.ingresso.slice(0,7))}) até o mês atual?`,
              async()=>{const n=await lancarDesdeIngresso(novo);toast(n?`${n} mensalidade(s) lançada(s).`:"Nenhuma mensalidade a lançar.");}
            ),60);
          }
        }
        return true;
      }catch(err){toast("Erro: "+err.message);return false;}
    });
}
async function lancarDesdeIngresso(ir){
  const curRef=new Date().toISOString().slice(0,7);
  let [y,m]=ir.ingresso.slice(0,7).split("-").map(Number);const rows=[];
  while(true){
    const ref=y+"-"+String(m).padStart(2,"0");
    if(ref>curRef)break;
    rows.push({irmao_id:ir.id,ref,valor:ir.mensalidade,vencimento:vencDoMes(ref,ir.diaVenc),status:"pendente",pagamento:null});
    m++;if(m>12){m=1;y++;}
  }
  if(!rows.length)return 0;
  const{error}=await sb.from("mensalidades").upsert(rows,{onConflict:"irmao_id,ref",ignoreDuplicates:true});
  if(error){toast("Erro: "+error.message);return 0;}
  await reloadMens();return rows.length;
}
function delIrmao(id){confirmBox(`Excluir "${irmaoNome(id)}"? As mensalidades vinculadas serão removidas.`,async()=>{
  try{const{error}=await sb.from("irmaos").delete().eq("id",id);if(error)throw error;
    await Promise.all([reloadIrmaos(),reloadMens()]);renderIrmaos();toast("Irmão excluído.");
  }catch(err){toast("Erro: "+err.message);}});}

        <input class="grow" id="f-mq" placeholder="Buscar irmão..." oninput="renderMens()">
      </div>
      <div id="mens-table"></div>

}
function renderMens(){
  const edit=canEdit("mensalidades");
  const ref=$("#f-ref").value,st=$("#f-st").value,q=($("#f-mq").value||"").toLowerCase();
  let rows=DB.mens.filter(m=>(!ref||m.ref===ref)&&(!st||m.status===st)&&irmaoNome(m.irmaoId).toLowerCase().includes(q));
  rows.sort((a,b)=>b.ref.localeCompare(a.ref)||irmaoNome(a.irmaoId).localeCompare(irmaoNome(b.irmaoId)));
  $("#mens-table").innerHTML=`<table><thead><tr><th>Irmão</th><th>Mês ref.</th><th>Vencimento</th><th class="num">Valor</th><th>Status</th><th>Pago em</th>${edit?'<th></th>':''}</tr></thead><tbody>
    ${rows.length?rows.map(m=>`<tr>
      <td>${irmaoNome(m.irmaoId)}</td><td>${refLabel(m.ref)}</td><td>${fdate(m.vencimento)}</td><td class="num">${BRL(m.valor)}</td>
      <td>${statusBadge(m.status)}</td><td>${fdate(m.pagamento)}</td>
      ${edit?`<td><div class="row-actions">
        ${m.status!=="pago"?`<button class="iconbtn" onclick="pagarMens(${m.id})">Marcar pago</button>`:`<button class="iconbtn" onclick="estornarMens(${m.id})">Estornar</button>`}
        <button class="iconbtn del" onclick="delMens(${m.id})">×</button></div></td>`:''}
    </tr>`).join(""):`<tr><td colspan="7" class="empty">Nenhuma mensalidade encontrada.</td></tr>`}
  </tbody></table>`;
}
function gerarMensalidades(){
  const cur=new Date().toISOString().slice(0,7);
  openModal("Gerar mensalidades",`
    <div class="field"><label>Mês de referência</label><input id="g-ref" type="month" value="${cur}"></div>
    <p style="color:var(--muted);font-size:12.5px;line-height:1.5">Serão criadas mensalidades para todos os Irmãos <b>ativos</b> que ainda não possuem lançamento nesse mês. Escolha o mês de ingresso do Irmão para lançar meses anteriores.</p>`,
    async ()=>{
      const ref=$("#g-ref").value;if(!ref){toast("Selecione o mês.");return false;}
      const faltam=DB.irmaos.filter(i=>i.ativo&&!DB.mens.some(m=>m.irmaoId===i.id&&m.ref===ref));
      if(!faltam.length){toast(`Todos os Irmãos ativos já possuem mensalidade em ${refLabel(ref)}.`);return true;}
      const rows=faltam.map(i=>({irmao_id:i.id,ref,valor:i.mensalidade,vencimento:vencDoMes(ref,i.diaVenc),status:"pendente",pagamento:null}));
      try{
        const{error}=await sb.from("mensalidades").upsert(rows,{onConflict:"irmao_id,ref",ignoreDuplicates:true});if(error)throw error;
        await reloadMens();renderMens();toast(`${rows.length} mensalidade(s) gerada(s) para ${refLabel(ref)}.`);
        return true;
      }catch(err){toast("Erro: "+err.message);return false;}
    });
}
async function pagarMens(id){
  const m=DB.mens.find(x=>x.id===id);const dt=new Date().toISOString().slice(0,10);
  try{
    let r=await sb.from("mensalidades").update({status:"pago",pagamento:dt}).eq("id",id);if(r.error)throw r.error;
    r=await sb.from("caixa").insert({tipo:"entrada",categoria:"Mensalidades",descricao:`Mensalidade ${refLabel(m.ref)} — ${irmaoNome(m.irmaoId)}`,valor:m.valor,data:dt});if(r.error)throw r.error;
    await Promise.all([reloadMens(),reloadCaixa()]);renderMens();toast("Pagamento registrado e lançado no caixa.");
  }catch(err){toast("Erro: "+err.message);}
}
async function estornarMens(id){
  try{const{error}=await sb.from("mensalidades").update({status:"pendente",pagamento:null}).eq("id",id);if(error)throw error;
    await reloadMens();renderMens();toast("Pagamento estornado.");
  }catch(err){toast("Erro: "+err.message);}
}
async function delMens(id){
  try{const{error}=await sb.from("mensalidades").delete().eq("id",id);if(error)throw error;
    await reloadMens();renderMens();toast("Mensalidade removida.");
  }catch(err){toast("Erro: "+err.message);}
}

    <div class="grid2">
      <div class="field"><label>Categoria</label><select id="c-cat">${cats.map(x=>`<option ${x===c.categoria?'selected':''}>${x}</option>`).join("")}</select></div>
      <div class="field"><label>Data</label><input id="c-data" type="date" value="${c.data}"></div>
    </div>`,
    async ()=>{
      const descricao=$("#c-desc").value.trim();if(!descricao){toast("Informe a descrição.");return false;}
      const obj={tipo:$("#c-tipo").value,categoria:$("#c-cat").value,descricao,valor:+$("#c-val").value||0,data:$("#c-data").value};
      try{
        if(id){const{error}=await sb.from("caixa").update(obj).eq("id",id);if(error)throw error;toast("Lançamento atualizado.");}
        else{const{error}=await sb.from("caixa").insert(obj);if(error)throw error;toast("Lançamento registrado.");}
        await reloadCaixa();renderCaixa();return true;
      }catch(err){toast("Erro: "+err.message);return false;}
    });
}
async function delCaixa(id){
  try{const{error}=await sb.from("caixa").delete().eq("id",id);if(error)throw error;
    await reloadCaixa();renderCaixa();toast("Lançamento removido.");
  }catch(err){toast("Erro: "+err.message);}
}

/* =================================================================
   PÁGINA: REUNIÕES
   ================================================================= */
function pageReunioes(){
  const edit=canEdit("reunioes");
  $("#main").innerHTML=`
    <div class="page-head">
      <div><h2>Avisos de Reuniões</h2><p>Agenda de sessões e eventos da Loja</p></div>
      ${edit?`<button class="btn" onclick="modalReuniao()">+ Nova Reunião</button>`:""}
    </div>
    <div class="panel"><div id="re-list"></div></div>`;
  renderReunioes();
}
function renderReunioes(){
  const edit=canEdit("reunioes");
  const hoje=new Date().toISOString().slice(0,10);
  const rows=[...DB.reunioes].sort((a,b)=>a.data.localeCompare(b.data));
  $("#re-list").innerHTML=rows.length?rows.map(r=>{
    const passada=r.data<hoje;
    return `<div class="meeting" style="${passada?'opacity:.55':''}">
      <div class="date"><div class="d">${r.data.split("-")[2]}</div><div class="m">${MESES[+r.data.split("-")[1]-1]}</div></div>
      <div class="info">
        <h4>${r.titulo} ${passada?'<span class="badge gray">Realizada</span>':'<span class="badge green">Agendada</span>'}</h4>
        <div class="meta">${r.hora||""} · ${r.local||""} · <span class="badge blue">${r.tipo||""}</span></div>
        ${r.obs?`<div class="meta" style="margin-top:6px">${r.obs}</div>`:''}
        ${edit?`<div class="row-actions" style="margin-top:10px;justify-content:flex-start">
          <button class="iconbtn" onclick="modalReuniao(${r.id})">Editar</button>
          <button class="iconbtn del" onclick="delReuniao(${r.id})">Excluir</button></div>`:''}
      </div></div>`;
  }).join(""):`<div class="empty">Nenhuma reunião agendada.</div>`;
}
function modalReuniao(id){
  const r=id?DB.reunioes.find(x=>x.id===id):{titulo:"",data:isoAddDays(7),hora:"20:00",local:"Templo Principal",tipo:"Sessão",obs:""};
  const tipos=["Sessão","Sessão Magna","Sessão Econômica","Evento","Reunião Administrativa"];
  openModal(id?"Editar Reunião":"Nova Reunião",`
    <div class="field"><label>Título</label><input id="r-tit" value="${esc(r.titulo)}"></div>
    <div class="grid2">
      <div class="field"><label>Data</label><input id="r-data" type="date" value="${r.data}"></div>
      <div class="field"><label>Hora</label><input id="r-hora" type="time" value="${r.hora||''}"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Local</label><input id="r-local" value="${esc(r.local)}"></div>
      <div class="field"><label>Tipo</label><select id="r-tipo">${tipos.map(t=>`<option ${t===r.tipo?'selected':''}>${t}</option>`).join("")}</select></div>
    </div>
    <div class="field"><label>Observações</label><textarea id="r-obs">${esc(r.obs)}</textarea></div>`,
    async ()=>{
      const titulo=$("#r-tit").value.trim();if(!titulo){toast("Informe o título.");return false;}
      const obj={titulo,data:$("#r-data").value,hora:$("#r-hora").value,local:$("#r-local").value.trim(),tipo:$("#r-tipo").value,obs:$("#r-obs").value.trim()};
      try{
        if(id){const{error}=await sb.from("reunioes").update(obj).eq("id",id);if(error)throw error;toast("Reunião atualizada.");}
        else{const{error}=await sb.from("reunioes").insert(obj);if(error)throw error;toast("Reunião agendada.");}
        await reloadReunioes();renderReunioes();return true;
      }catch(err){toast("Erro: "+err.message);return false;}
    });
}
async function delReuniao(id){
  try{const{error}=await sb.from("reunioes").delete().eq("id",id);if(error)throw error;
    await reloadReunioes();renderReunioes();toast("Reunião excluída.");
  }catch(err){toast("Erro: "+err.message);}
}

/* =================================================================
   PÁGINA: MANUAIS (gestão — admin)
   ================================================================= */
function pageManuais(){
  $("#main").innerHTML=`
    <div class="page-head"><div><h2>Manuais por Grau</h2>
      <p>Envie o PDF de cada grau. O Irmão baixa na "Minha Situação" o manual do seu grau e dos anteriores.</p></div></div>
    <div class="panel"><div id="man-table"></div></div>`;
  renderManuais();
}
function renderManuais(){
  const rows=DB.manuais.slice().sort((a,b)=>GRAUS.indexOf(a.grau)-GRAUS.indexOf(b.grau));
  $("#man-table").innerHTML=`<table><thead><tr><th>Grau</th><th>Título do manual</th><th>Arquivo</th><th></th></tr></thead><tbody>
    ${rows.map(m=>{
      const has=!!m.arquivo_path;
      return `<tr>
        <td><b>${m.grau}</b></td>
        <td><input value="${esc(m.titulo)}" onchange="setManTit('${m.grau}',this.value)" style="width:100%;padding:7px 9px;background:var(--navy);color:var(--txt);border:1px solid var(--line);border-radius:8px;font-size:13px"></td>
        <td>${has?`<a class="badge green" style="text-decoration:none" href="${manualHref(m)}" target="_blank">PDF enviado ↗</a>`:`<span class="badge gray">Não enviado</span>`}</td>
        <td><div class="row-actions">
          <label class="iconbtn" style="cursor:pointer">Enviar PDF<input type="file" accept="application/pdf" style="display:none" onchange="uploadManual('${m.grau}',this)"></label>
          ${has?`<button class="iconbtn del" onclick="delManual('${m.grau}')">Remover</button>`:''}
        </div></td>
      </tr>`;
    }).join("")}
  </tbody></table>`;
}
async function setManTit(grau,v){
  try{const{error}=await sb.from("manuais").update({titulo:v.trim()||("Manual do "+grau)}).eq("grau",grau);if(error)throw error;await reloadManuais();}
  catch(err){toast("Erro: "+err.message);}
}
async function uploadManual(grau,input){
  const f=input.files[0];if(!f)return;
  if(f.type!=="application/pdf"){toast("Selecione um arquivo PDF.");return;}
  toast("Enviando…");
  const path=slug(grau)+".pdf";
  try{
    let r=await sb.storage.from("manuais").upload(path,f,{upsert:true,contentType:"application/pdf"});if(r.error)throw r.error;
    r=await sb.from("manuais").update({arquivo_path:path}).eq("grau",grau);if(r.error)throw r.error;
    await reloadManuais();renderManuais();toast("Manual do "+grau+" enviado.");
  }catch(err){toast("Erro: "+err.message);}
}
function delManual(grau){confirmBox(`Remover o manual do grau ${grau}?`,async()=>{
  const m=DB.manuais.find(x=>x.grau===grau);
  try{
    if(m&&m.arquivo_path){await sb.storage.from("manuais").remove([m.arquivo_path]);}
    const{error}=await sb.from("manuais").update({arquivo_path:null}).eq("grau",grau);if(error)throw error;
    await reloadManuais();renderManuais();toast("Manual removido.");
  }catch(err){toast("Erro: "+err.message);}
});}

/* =================================================================
   PÁGINA: MINHA SITUAÇÃO (Irmão)
   ================================================================= */
function pageMinha(){
  const irmaoId=USER.irmaoId;
  const ir=DB.irmaos.find(i=>i.id===irmaoId);
  const minhasMens=DB.mens.filter(m=>m.irmaoId===irmaoId).sort((a,b)=>b.ref.localeCompare(a.ref));
  const minhasTaxas=DB.taxas.filter(t=>t.irmaoId===irmaoId||t.irmaoId===null);
  const pend=minhasMens.filter(m=>m.status!=="pago").reduce((s,m)=>s+m.valor,0)+minhasTaxas.filter(t=>t.status!=="pago").reduce((s,t)=>s+t.valor,0);
  const hoje=new Date().toISOString().slice(0,10);
  const prox=DB.reunioes.filter(r=>r.data>=hoje).sort((a,b)=>a.data.localeCompare(b.data));
  const meuIdx=ir?GRAUS.indexOf(ir.grau):GRAUS.length-1;
  const meusManuais=DB.manuais.filter(m=>GRAUS.indexOf(m.grau)<=meuIdx).sort((a,b)=>GRAUS.indexOf(a.grau)-GRAUS.indexOf(b.grau));
  $("#main").innerHTML=`
    <div class="page-head"><div><h2>Minha Situação</h2><p>${ir?ir.nome+' · '+ir.grau:USER.nome}</p></div></div>
    <div class="cards">
      <div class="card"><div class="k">Total em Aberto</div><div class="v ${pend>0?'red':'green'}">${BRL(pend)}</div><div class="foot">mensalidades + taxas pendentes</div></div>
      <div class="card"><div class="k">Mensalidade</div><div class="v gold">${ir?BRL(ir.mensalidade):'—'}</div><div class="foot">valor mensal</div></div>
      <div class="card"><div class="k">Próximas Reuniões</div><div class="v">${prox.length}</div><div class="foot">agendadas</div></div>
    </div>
    <div class="panel"><h3>&#9750; Minhas Mensalidades</h3>
      <table><thead><tr><th>Mês</th><th>Vencimento</th><th class="num">Valor</th><th>Status</th><th>Pago em</th></tr></thead><tbody>
      ${minhasMens.length?minhasMens.map(m=>`<tr><td>${refLabel(m.ref)}</td><td>${fdate(m.vencimento)}</td><td class="num">${BRL(m.valor)}</td><td>${statusBadge(m.status)}</td><td>${fdate(m.pagamento)}</td></tr>`).join(""):`<tr><td colspan="5" class="empty">Sem mensalidades.</td></tr>`}
      </tbody></table>
    </div>
    <div class="panel"><h3>&#9874; Minhas Taxas</h3>
      <table><thead><tr><th>Descrição</th><th class="num">Valor</th><th>Vencimento</th><th>Status</th></tr></thead><tbody>
      ${minhasTaxas.length?minhasTaxas.map(t=>`<tr><td>${t.descricao}${t.irmaoId===null?' <span class="badge blue">Geral</span>':''}</td><td class="num">${BRL(t.valor)}</td><td>${fdate(t.vencimento)}</td><td>${statusBadge(t.status)}</td></tr>`).join(""):`<tr><td colspan="4" class="empty">Sem taxas.</td></tr>`}
      </tbody></table>
    </div>
    <div class="panel"><h3>&#128214; Manuais do Grau</h3>
      <table><thead><tr><th>Manual</th><th>Grau</th><th class="num">Baixar</th></tr></thead><tbody>
      ${meusManuais.length?meusManuais.map(m=>{const href=manualHref(m);return `<tr>
        <td><b>${m.titulo}</b></td>
        <td>${m.grau}${GRAUS.indexOf(m.grau)===meuIdx?' <span class="badge gold" style="background:rgba(201,162,39,.16);color:var(--gold2)">seu grau</span>':''}</td>
        <td class="num">${href?`<a class="btn sm" href="${href}" target="_blank">&#11015; Baixar PDF</a>`:`<span class="badge gray">Em breve</span>`}</td>
      </tr>`;}).join(""):`<tr><td colspan="3" class="empty">Nenhum manual disponível.</td></tr>`}
      </tbody></table>
    </div>
    <div class="panel"><h3>&#9737; Próximas Reuniões</h3>
      ${prox.length?prox.map(r=>`<div class="meeting"><div class="date"><div class="d">${r.data.split("-")[2]}</div><div class="m">${MESES[+r.data.split("-")[1]-1]}</div></div>
        <div class="info"><h4>${r.titulo}</h4><div class="meta">${r.hora||""} · ${r.local||""} · <span class="badge blue">${r.tipo||""}</span></div>${r.obs?`<div class="meta" style="margin-top:5px">${r.obs}</div>`:''}</div></div>`).join(""):`<div class="empty">Nenhuma reunião agendada.</div>`}
    </div>`;
}

/* =================================================================
   MODAL GENÉRICO + CONFIRM
   ================================================================= */
function openModal(title,bodyHTML,onSave){
  const root=$("#modal-root");
  root.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal"><header><h3>${title}</h3><button class="iconbtn" onclick="closeModal()">✕</button></header>
    <div class="body">${bodyHTML}</div>
    <footer><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn" id="modal-save">Salvar</button></footer>
    </div></div>`;
  $("#modal-save").onclick=async()=>{
    const btn=$("#modal-save");btn.disabled=true;
    try{const r=await onSave();if(r!==false)closeModal();}finally{const b=$("#modal-save");if(b)b.disabled=false;}
  };
}
function closeModal(){$("#modal-root").innerHTML="";}
function confirmBox(msg,onYes){
  const root=$("#modal-root");
  root.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-width:380px"><div class="body" style="text-align:center;padding-top:26px">
      <div style="font-size:34px;color:var(--amber)">&#9888;</div><p style="margin:14px 0 4px">${msg}</p></div>
    <footer style="justify-content:center"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn danger" id="cf-yes">Confirmar</button></footer>
    </div></div>`;
  $("#cf-yes").onclick=async()=>{const b=$("#cf-yes");b.disabled=true;try{await onYes();}finally{}closeModal();};
}

/* inicia */
init();
</script>
</body>
</html>
